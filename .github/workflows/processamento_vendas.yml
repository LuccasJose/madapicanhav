name: Processamento de Vendas - Análise ABC e Temporal

on:
  push:
    paths:
      - 'dados_vendas.csv'
      - 'dados_vendas.xlsx'
      - 'GMRMPMA*.csv'
      - 'GMRMPMA*.xlsx'
  workflow_dispatch:
    inputs:
      arquivo_dados:
        description: 'Nome do arquivo de dados a processar (CSV ou XLSX)'
        required: false
        default: ''

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  ARQUIVO_DADOS: ${{ github.event.inputs.arquivo_dados || '' }}

jobs:
  analise-vendas:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 horas (máximo do GitHub Actions)

    permissions:
      contents: write

    steps:
      # 1. Checkout do repositório
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Configurar Python
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Resolver arquivo de dados
      - name: 🔍 Resolver arquivo de dados
        run: |
          shopt -s nullglob
          echo "📂 Listando arquivos de dados no diretório:"
          ls -la *.xlsx *.csv 2>/dev/null || echo "Nenhum arquivo de dados encontrado"

          ARQUIVO_INPUT="${{ env.ARQUIVO_DADOS }}"
          if [ -n "$ARQUIVO_INPUT" ]; then
            if [ ! -f "$ARQUIVO_INPUT" ]; then
              echo "❌ Arquivo informado '$ARQUIVO_INPUT' não encontrado!"
              exit 1
            fi
            ARQUIVO="$ARQUIVO_INPUT"
          else
            candidatos=()
            for padrao in dados_vendas.xlsx dados_vendas.csv dados_vendas.xls GMRMPMA*.xlsx GMRMPMA*.csv GMRMPMA*.xls; do
              for arquivo in $padrao; do
                [ -f "$arquivo" ] && candidatos+=("$arquivo")
              done
            done

            if [ ${#candidatos[@]} -eq 0 ]; then
              echo "❌ Nenhum arquivo de dados compatível foi encontrado!"
              exit 1
            fi

            ARQUIVO="${candidatos[0]}"
          fi

          echo "ARQUIVO_DADOS=$ARQUIVO" >> "$GITHUB_ENV"
          echo "✅ Arquivo '$ARQUIVO' encontrado"
          echo "📊 Tamanho: $(ls -lh "$ARQUIVO" | awk '{print $5}')"

      # 5. Executar análise ABC (Curva ABC) — gera JSONs por categoria + consolidado
      - name: 📈 Executar Análise ABC (relatorio_teste.py)
        continue-on-error: true
        run: |
          echo "🚀 Iniciando análise ABC (multi-categoria)..."
          ARQUIVO="${{ env.ARQUIVO_DADOS }}"
          python scripts/relatorio_teste.py "$ARQUIVO" --gerar-por-categoria
          echo "✅ Análise ABC concluída (5 JSONs: consolidado + 4 categorias)"

      # 6. Executar análise temporal multi-granularidade — gera JSONs por categoria + consolidado
      - name: 📅 Executar Análise Temporal Multi-Granularidade
        continue-on-error: true
        run: |
          echo "🚀 Iniciando análise temporal multi-categoria (diário, semanal, mensal)..."
          ARQUIVO="${{ env.ARQUIVO_DADOS }}"
          python scripts/analise_temporal_multi.py "$ARQUIVO" --all --gerar-por-categoria
          echo "✅ Análise temporal multi-granularidade concluída"

      # 7. Verificar JSONs gerados
      - name: 🔍 Verificar arquivos JSON gerados
        run: |
          echo "📁 Arquivos JSON na raiz:"
          ls -la *.json 2>/dev/null || echo "⚠️ Nenhum arquivo JSON na raiz"
          echo ""
          echo "📁 Arquivos JSON em docs/data/:"
          ls -la docs/data/*.json 2>/dev/null || echo "⚠️ Nenhum arquivo JSON em docs/data/"
          echo ""
          echo "📊 Resumo dos arquivos gerados:"
          for f in docs/data/*.json; do
            if [ -f "$f" ]; then
              echo "  - $f ($(wc -c < "$f") bytes)"
            fi
          done

      # 8. Configurar Git para commit
      - name: 🔧 Configurar Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

      # 9. Commit e push dos resultados
      - name: 📤 Commit dos resultados JSON
        run: |
          # Adiciona JSONs da raiz e da pasta docs/data
          git add *.json 2>/dev/null || true
          git add docs/data/*.json 2>/dev/null || true

          # Verifica se há mudanças para commitar
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma alteração nos arquivos JSON para commitar"
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            git commit -m "chore: atualização automática dos resultados de análise [skip ci]

            📅 Data: $TIMESTAMP
            📊 Arquivo processado: ${{ env.ARQUIVO_DADOS }}
            📁 JSONs em: docs/data/
            🤖 Gerado automaticamente pelo GitHub Actions"

            git push
            echo "✅ Resultados commitados com sucesso!"
          fi

      # 10. Sumário da execução
      - name: 📋 Sumário da Execução
        if: always()
        run: |
          echo "## 📊 Resumo da Execução" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo processado | \`${{ env.ARQUIVO_DADOS }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Data/Hora | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Arquivos JSON gerados:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la *.json 2>/dev/null || echo "Nenhum JSON encontrado"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

