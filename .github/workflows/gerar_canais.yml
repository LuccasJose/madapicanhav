name: Gerar Dados de Canais de Vendas

on:
  schedule:
    # Executar diariamente às 2 da manhã (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Permite execução manual
  push:
    paths:
      - 'GMRMPMA*.csv'  # Executar quando o CSV é atualizado

jobs:
  gerar-canais:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas
      
      - name: Gerar dados de canais
        run: python scripts/gerar_canais_automatico.py
      
      - name: Commit e Push (se houver mudanças)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/analise_canais.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Atualizar dados de canais de vendas" && git push)

