name: Gerar Dados de Canais de Vendas

on:
  schedule:
    # Executar diariamente às 2 da manhã (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      arquivo_dados:
        description: 'Arquivo de dados opcional (CSV ou XLSX). Se vazio, detecta automaticamente.'
        required: false
        default: ''
  push:
    paths:
      - 'dados_vendas.csv'
      - 'dados_vendas.xlsx'
      - 'GMRMPMA*.csv'
      - 'GMRMPMA*.xlsx'

jobs:
  gerar-canais:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Resolver arquivo de dados
        shell: bash
        run: |
          shopt -s nullglob
          ARQUIVO_INPUT='${{ github.event.inputs.arquivo_dados }}'

          if [[ -n "$ARQUIVO_INPUT" ]]; then
            if [[ ! -f "$ARQUIVO_INPUT" ]]; then
              echo "❌ Arquivo informado não encontrado: $ARQUIVO_INPUT"
              ls -la *.xlsx *.csv 2>/dev/null || echo "Nenhum arquivo de dados encontrado"
              exit 1
            fi
            ARQUIVO="$ARQUIVO_INPUT"
          else
            candidatos=()
            for padrao in dados_vendas.xlsx dados_vendas.csv dados_vendas.xls GMRMPMA*.xlsx GMRMPMA*.csv GMRMPMA*.xls; do
              for arquivo in $padrao; do
                [[ -f "$arquivo" ]] && candidatos+=("$arquivo")
              done
            done

            if (( ${#candidatos[@]} == 0 )); then
              echo "❌ Nenhum arquivo de dados compatível foi encontrado"
              ls -la *.xlsx *.csv 2>/dev/null || echo "Nenhum arquivo de dados encontrado"
              exit 1
            fi

            ARQUIVO="${candidatos[0]}"
          fi

          echo "✅ Arquivo resolvido: $ARQUIVO"
          echo "ARQUIVO_DADOS=$ARQUIVO" >> "$GITHUB_ENV"
      
      - name: Gerar dados de canais
        run: python scripts/gerar_canais_automatico.py "$ARQUIVO_DADOS"
      
      - name: Commit e Push (se houver mudanças)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/analise_canais.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Atualizar dados de canais de vendas" && git push)

